<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>본죽&비빔밥 카드뉴스 생성기</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ── 헤더 ── -->
  <header class="site-header">
    <div class="site-header__inner">
      <span class="site-header__logo">🍵</span>
      <span class="site-header__title">본죽&amp;비빔밥 카드뉴스 생성기</span>
    </div>
  </header>

  <!-- ── 메인 ── -->
  <main class="main">

    <!-- 입력 패널 -->
    <section class="panel panel--form" id="formPanel">
      <h2 class="panel__title">매장 정보 입력</h2>
      <p class="panel__desc">아래 정보를 입력하면 카드뉴스가 바로 생성됩니다.</p>

      <div class="field">
        <label class="field__label" for="storeName">매장명 <span class="req">*</span></label>
        <input class="field__input" id="storeName"
               type="text" placeholder="예: 본죽&비빔밥 부산대연점">
      </div>

      <div class="field">
        <label class="field__label" for="phone">전화번호</label>
        <input class="field__input" id="phone"
               type="tel" placeholder="예: 051-627-7654">
      </div>

      <div class="field">
        <label class="field__label" for="discount">할인 혜택 <span class="req">*</span></label>
        <input class="field__input" id="discount"
               type="text" placeholder="예: 20%  또는  3,000원 할인">
      </div>

      <div class="field">
        <label class="field__label" for="kakaoUrl">카카오채널 링크</label>
        <input class="field__input" id="kakaoUrl"
               type="url" value="https://pf.kakao.com/_rdmwd"
               placeholder="https://pf.kakao.com/...">
      </div>

      <button class="btn btn--primary btn--full" id="generateBtn">
        🎨 카드뉴스 생성하기
      </button>
    </section>

    <!-- 결과 패널 -->
    <section class="panel panel--result" id="resultPanel" style="display:none">
      <h2 class="panel__title">완성된 카드뉴스</h2>
      <p class="panel__desc">아래 이미지를 저장해서 사용하세요.</p>

      <div class="canvas-wrap">
        <canvas id="cardCanvas"></canvas>
      </div>

      <div class="btn-row">
        <button class="btn btn--primary" id="saveBtn">💾 PNG 저장</button>
        <button class="btn btn--outline" id="backBtn">← 다시 입력</button>
      </div>

      <div class="tip">
        💡 저장이 안 될 경우 캔버스 위에서 <strong>우클릭 → 이미지 저장</strong>을 이용하세요.
      </div>
    </section>

  </main>

  <!-- ── 푸터 ── -->
  <footer class="site-footer">
    본죽&amp;비빔밥 가맹점 전용 카드뉴스 생성기
  </footer>

  <script src="app.js"></script>
</body>
</html>
