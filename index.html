<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>본죽&비빔밥 카드뉴스 생성기</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="site-header">
    <div class="site-header__inner">
      <span class="site-header__logo">🍵</span>
      <span class="site-header__title">본죽&amp;비빔밥 카드뉴스 생성기</span>
    </div>
  </header>

  <main class="main">

    <!-- 폼 영역 -->
    <div id="formSection">

      <!-- 히어로 -->
      <div class="hero">
        <div class="hero__badge">✦ 가맹점 전용</div>
        <h1 class="hero__title">카카오채널 QR 카드뉴스를<br>5초 만에 만들어요</h1>
        <p class="hero__desc">매장명과 혜택만 입력하면<br>QR코드가 담긴 홍보 이미지가 완성됩니다.</p>
      </div>

      <!-- 입력 폼 -->
      <div class="form-card">
        <div class="form-card__section-label">매장 정보</div>

        <div class="field">
          <label class="field__label" for="storeName">
            매장명 <span class="req">*</span>
          </label>
          <div class="field__input-wrap">
            <span class="field__icon">🏠</span>
            <input class="field__input" id="storeName"
              type="text" placeholder="예) 부산대연점" autocomplete="off">
          </div>
        </div>

        <div class="field">
          <label class="field__label" for="phone">
            전화번호 <span class="field__hint">선택</span>
          </label>
          <div class="field__input-wrap">
            <span class="field__icon">📞</span>
            <input class="field__input" id="phone"
              type="tel" placeholder="예) 051-627-7654">
          </div>
        </div>

        <div class="divider"></div>
        <div class="form-card__section-label">프로모션 정보</div>

        <div class="field">
          <label class="field__label" for="discount">
            할인 혜택 <span class="req">*</span>
          </label>
          <div class="field__input-wrap">
            <span class="field__icon">🎁</span>
            <input class="field__input" id="discount"
              type="text" placeholder="예) 20%  또는  3,000원 할인">
          </div>
        </div>

        <div class="field">
          <label class="field__label" for="kakaoUrl">
            카카오채널 링크 <span class="req">*</span>
          </label>
          <div class="field__input-wrap">
            <span class="field__icon">💬</span>
            <input class="field__input" id="kakaoUrl"
              type="url" value="https://pf.kakao.com/_rdmwd"
              placeholder="https://pf.kakao.com/...">
          </div>
        </div>

        <button class="btn-generate" id="generateBtn">
          <span class="btn-generate__icon">✨</span>
          카드뉴스 생성하기
        </button>
      </div>

    </div>

    <!-- 결과 영역 -->
    <div id="resultSection" style="display:none">

      <div class="result-card">
        <div class="result-card__header">
          <h2 class="result-card__title">완성된 카드뉴스</h2>
          <span class="result-card__badge">✅ 생성 완료</span>
        </div>
        <p class="result-card__desc">이미지를 저장해서 카카오톡·인스타그램에 바로 활용하세요.</p>

        <div class="canvas-wrap">
          <canvas id="cardCanvas"></canvas>
        </div>

        <div class="btn-row">
          <button class="btn-save" id="saveBtn">
            💾 PNG로 저장하기
          </button>
          <button class="btn-back" id="backBtn">
            ← 다시 입력
          </button>
        </div>

        <div class="tip">
          💡 저장이 안 될 경우 이미지 위에서 <strong>우클릭 → 이미지 저장</strong>을 이용하세요.
        </div>
      </div>

    </div>

  </main>

  <footer class="site-footer">
    <p class="site-footer__text">본죽&amp;비빔밥 가맹점 전용 서비스</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
